services:
  - type: web
    name: ai-gym-coach
    runtime: python

    buildCommand: |
      apt-get update
      apt-get install -y libgl1 libglib2.0-0 ffmpeg
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: streamlit run backend/main.py --server.port=$PORT --server.address=0.0.0.0

    plan: free